name: Test Analytics Reporting

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    
    env:
      ANALYTICS_API_URL: ${{ secrets.ANALYTICS_API_URL || 'http://localhost:3001/api' }}
      PROJECT_ID: ${{ secrets.PROJECT_ID || github.repository }}
      PROJECT_NAME: ${{ github.event.repository.name }}
      API_KEY: ${{ secrets.ANALYTICS_API_KEY }}
      CI_BUILD_ID: ${{ github.run_id }}
      CI_COMMIT_SHA: ${{ github.sha }}
      CI_COMMIT_BRANCH: ${{ github.ref_name }}
      CI_COMMIT_AUTHOR: ${{ github.actor }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci
        working-directory: packages/frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: packages/frontend

      - name: Run tests
        run: npx playwright test
        working-directory: packages/frontend
        continue-on-error: true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: packages/frontend/playwright-report/
          retention-days: 30

  # Test analytics dashboard is available
  check-analytics:
    runs-on: ubuntu-latest
    if: ${{ secrets.ANALYTICS_API_URL }}
    steps:
      - name: Check analytics API
        run: |
          curl -f ${{ secrets.ANALYTICS_API_URL }}/health || echo "Analytics API not available"
